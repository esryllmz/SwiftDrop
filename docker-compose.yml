services:
  postgres:
    image: postgres:16-alpine
    container_name: swiftdrop-postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5439}:${POSTGRES_CONTAINER_PORT:-5432}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-swiftdrop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swiftdrop_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swiftdrop-network

  redis:
    image: redis:7-alpine
    container_name: swiftdrop-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swiftdrop-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: swiftdrop-kafka
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-9092}'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - swiftdrop-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: swiftdrop-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: swiftdrop-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - swiftdrop-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: swiftdrop-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    networks:
      - swiftdrop-network

  swiftdrop-auth-service:
    build: ./swiftdrop-auth-service
    container_name: swiftdrop-auth-service
    ports:
      - "8081:8081"
    environment:
      AUTH_DB_URL: jdbc:postgresql://postgres:5432/swiftdrop_auth_db
      POSTGRES_USER: ${POSTGRES_USER:-swiftdrop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swiftdrop_password}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS:-900000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-Lax}
      SEED_ADMIN_ENABLED: ${SEED_ADMIN_ENABLED:-true}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@swiftdrop.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin123!}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-internal-api-key}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-false}
      PASSWORD_RESET_EMAIL_PROVIDER: ${PASSWORD_RESET_EMAIL_PROVIDER:-smtp}
      PASSWORD_RESET_FROM_ADDRESS: ${PASSWORD_RESET_FROM_ADDRESS:-no-reply@swiftdrop.local}
      PASSWORD_RESET_FROM_NAME: ${PASSWORD_RESET_FROM_NAME:-SwiftDrop}
      PASSWORD_RESET_ONESIGNAL_APP_ID: "${PASSWORD_RESET_ONESIGNAL_APP_ID-}"
      PASSWORD_RESET_ONESIGNAL_API_KEY: "${PASSWORD_RESET_ONESIGNAL_API_KEY-}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - swiftdrop-network

  swiftdrop-logistics-service:
    build: ./swiftdrop-logistics-service
    container_name: swiftdrop-logistics-service
    ports:
      - "8082:8082"
    environment:
      LOGISTICS_DB_URL: jdbc:postgresql://postgres:5432/swiftdrop_logistics_db
      POSTGRES_USER: ${POSTGRES_USER:-swiftdrop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swiftdrop_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AUTH_SERVICE_BASE_URL: http://swiftdrop-auth-service:8081
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-internal-api-key}
      SEED_DATA_ENABLED: ${SEED_DATA_ENABLED:-false}
      OUTBOX_PUBLISHER_FIXED_DELAY_MS: ${OUTBOX_PUBLISHER_FIXED_DELAY_MS:-5000}
      OUTBOX_MAX_RETRY_ATTEMPTS: ${OUTBOX_MAX_RETRY_ATTEMPTS:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      swiftdrop-auth-service:
        condition: service_started
    networks:
      - swiftdrop-network

  swiftdrop-notification-service:
    build: ./swiftdrop-notification-service
    container_name: swiftdrop-notification-service
    ports:
      - "8083:8083"
    environment:
      NOTIFICATION_DB_URL: jdbc:postgresql://postgres:5432/swiftdrop_notification_db
      POSTGRES_USER: ${POSTGRES_USER:-swiftdrop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swiftdrop_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ONESIGNAL_APP_ID: ${ONESIGNAL_APP_ID:-your-onesignal-app-id}
      ONESIGNAL_API_KEY: ${ONESIGNAL_API_KEY:-your-onesignal-rest-api-key}
      ONESIGNAL_MOCK_ENABLED: ${ONESIGNAL_MOCK_ENABLED:-true}
      PROCESSED_EVENT_TTL_HOURS: ${PROCESSED_EVENT_TTL_HOURS:-24}
      KAFKA_RETRY_MAX_ATTEMPTS: ${KAFKA_RETRY_MAX_ATTEMPTS:-3}
      KAFKA_RETRY_BACKOFF_MS: ${KAFKA_RETRY_BACKOFF_MS:-1000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - swiftdrop-network

  swiftdrop-gateway:
    build: ./swiftdrop-gateway
    container_name: swiftdrop-gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URI: http://swiftdrop-auth-service:8081
      LOGISTICS_SERVICE_URI: http://swiftdrop-logistics-service:8082
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3001}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    depends_on:
      - swiftdrop-auth-service
      - swiftdrop-logistics-service
    networks:
      - swiftdrop-network

volumes:
  postgres_data:
  redis_data:

networks:
  swiftdrop-network:
    driver: bridge
