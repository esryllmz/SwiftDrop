server:
  port: 8081

spring:
  application:
    name: swiftdrop-auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5439/swiftdrop_auth_db}
    username: ${POSTGRES_USER:swiftdrop_user}
    password: ${POSTGRES_PASSWORD:swiftdrop_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  mail:
    host: ${MAIL_HOST:mailpit}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

application:
  password-reset:
    token-ttl-minutes: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:15}
    email:
      provider: ${PASSWORD_RESET_EMAIL_PROVIDER:smtp}
      from-address: ${PASSWORD_RESET_FROM_ADDRESS:no-reply@swiftdrop.local}
      from-name: ${PASSWORD_RESET_FROM_NAME:SwiftDrop}
      onesignal:
        app-id: ${PASSWORD_RESET_ONESIGNAL_APP_ID:}
        api-key: ${PASSWORD_RESET_ONESIGNAL_API_KEY:}
        api-url: ${PASSWORD_RESET_ONESIGNAL_API_URL:https://api.onesignal.com/notifications}
  internal:
    api-key: ${INTERNAL_API_KEY:local-internal-api-key}
  provisioning:
    temporary-password-length: ${PROVISIONING_TEMP_PASSWORD_LENGTH:12}
  seed:
    admin:
      enabled: ${ADMIN_SEED_ENABLED:${SEED_ADMIN_ENABLED:true}}
      email: ${ADMIN_SEED_EMAIL:${SEED_ADMIN_EMAIL:admin@swiftdrop.com}}
      password: ${ADMIN_SEED_PASSWORD:${SEED_ADMIN_PASSWORD:Admin123!}}
      reset-existing-password: ${ADMIN_SEED_RESET_EXISTING_PASSWORD:false}
      force-enabled: ${ADMIN_SEED_FORCE_ENABLED:true}
      force-role-admin: ${ADMIN_SEED_FORCE_ROLE_ADMIN:true}
      force-password-change: ${ADMIN_SEED_FORCE_PASSWORD_CHANGE:false}
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: ${JWT_ACCESS_EXPIRATION_MS:900000}
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    cookie:
      secure: ${COOKIE_SECURE:false}
      same-site: ${COOKIE_SAME_SITE:Lax}
      path: ${COOKIE_PATH:/api/v1/auth}
