server:
  port: 8080

spring:
  application:
    name: swiftdrop-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "${FRONTEND_ORIGIN:http://localhost:3001}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**,/api/v1/health
        - id: logistics-service
          uri: ${LOGISTICS_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/logistics/**,/api/v1/orders/**,/api/v1/drivers/**,/api/v1/merchants/**,/api/v1/dashboard/**,/api/v1/outbox-events/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
