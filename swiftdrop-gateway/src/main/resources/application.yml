server:
  port: 8080

spring:
  application:
    name: swiftdrop-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins: "${FRONTEND_ORIGIN:http://localhost:3001}"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/v1/auth/**,/api/v1/health
            - id: auth-health-alias
              uri: ${AUTH_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/health
              filters:
                - SetPath=/api/v1/health
            - id: logistics-service
              uri: ${LOGISTICS_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/api/v1/logistics/**,/api/v1/orders/**,/api/v1/drivers/**,/api/v1/merchants/**,/api/v1/dashboard/**,/api/v1/outbox-events/**,/api/v1/applications/**,/api/v1/admin/applications/**,/api/v1/customer/**,/api/v1/merchant/**,/api/v1/courier/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  monitoring:
    timeout-ms: ${MONITORING_TIMEOUT_MS:1500}
    auth-service-url: ${AUTH_SERVICE_URI:http://localhost:8081}
    logistics-service-url: ${LOGISTICS_SERVICE_URI:http://localhost:8082}
    notification-service-url: ${NOTIFICATION_SERVICE_URI:http://localhost:8083}
    internal-api-key: ${INTERNAL_API_KEY:local-internal-api-key}
    outbox:
      pending-warning-threshold: ${MONITORING_OUTBOX_PENDING_WARNING_THRESHOLD:10}
      oldest-age-warning-seconds: ${MONITORING_OUTBOX_AGE_WARNING_SECONDS:60}
    kafka:
      lag-warning-threshold: ${MONITORING_KAFKA_LAG_WARNING_THRESHOLD:10}
