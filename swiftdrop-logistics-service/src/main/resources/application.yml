server:
  port: 8082

spring:
  application:
    name: swiftdrop-logistics-service
  datasource:
    url: ${LOGISTICS_DB_URL:jdbc:postgresql://localhost:5439/swiftdrop_logistics_db}
    username: ${POSTGRES_USER:swiftdrop_user}
    password: ${POSTGRES_PASSWORD:swiftdrop_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

application:
  internal:
    api-key: ${INTERNAL_API_KEY:local-internal-api-key}
  monitoring:
    timeout-ms: ${MONITORING_TIMEOUT_MS:1500}
  seed:
    enabled: ${SEED_DATA_ENABLED:false}
  demo:
    courier-id: ${DEMO_COURIER_ID:22222222-2222-2222-2222-222222222222}
  auth-service:
    base-url: ${AUTH_SERVICE_BASE_URL:http://localhost:8081}
    internal-api-key: ${INTERNAL_API_KEY:local-internal-api-key}
  outbox:
    publisher-fixed-delay-ms: ${OUTBOX_PUBLISHER_FIXED_DELAY_MS:5000}
    publish-batch-size: ${OUTBOX_PUBLISH_BATCH_SIZE:25}
    max-retry-attempts: ${OUTBOX_MAX_RETRY_ATTEMPTS:5}
