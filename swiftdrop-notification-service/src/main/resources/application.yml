server:
  port: 8083

spring:
  application:
    name: swiftdrop-notification-service
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5439/swiftdrop_notification_db}
    username: ${POSTGRES_USER:swiftdrop_user}
    password: ${POSTGRES_PASSWORD:swiftdrop_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: swiftdrop-notification-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        "[spring.json.trusted.packages]": "com.swiftdrop.logistics.dto,com.swiftdrop.notification.dto"
        "[spring.json.value.default.type]": "com.swiftdrop.notification.dto.OrderKafkaEvent"
        "[spring.json.use.type.headers]": false

application:
  idempotency:
    processed-event-ttl: ${PROCESSED_EVENT_TTL_HOURS:24}
  kafka:
    retry:
      max-attempts: ${KAFKA_RETRY_MAX_ATTEMPTS:3}
      backoff: ${KAFKA_RETRY_BACKOFF_MS:1000}
  onesignal:
    app-id: ${ONESIGNAL_APP_ID:}
    api-key: ${ONESIGNAL_API_KEY:}
    mock-enabled: ${ONESIGNAL_MOCK_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
