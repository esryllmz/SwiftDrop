services:
  postgres:
    ports:
      - "${POSTGRES_HOST_PORT:-5439}:${POSTGRES_CONTAINER_PORT:-5432}"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  kafka:
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"

  mailpit:
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"

  swiftdrop-auth-service:
    ports:
      - "8081:8081"

  swiftdrop-logistics-service:
    ports:
      - "8082:8082"

  swiftdrop-notification-service:
    ports:
      - "8083:8083"
